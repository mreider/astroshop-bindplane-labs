---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bindplane-node-agent
  labels:
    app.kubernetes.io/name: bindplane-agent
    app.kubernetes.io/component: node
  namespace: bindplane-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bindplane-agent
      app.kubernetes.io/component: node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bindplane-agent
        app.kubernetes.io/component: node
    spec:
      serviceAccount: bindplane-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000000000
        runAsGroup: 1000000000
        fsGroup: 1000000000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: setup-volumes
          image: ghcr.io/observiq/bindplane-agent:1.80.1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000000000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["sh", "-c"]
          args:
            - |
              echo '
              receivers:
                nop:
              processors:
                batch:
              exporters:
                nop:
              service:
                pipelines:
                  metrics:
                    receivers: [nop]
                    processors: [batch]
                    exporters: [nop]
                telemetry:
                  metrics:
                    level: none
              ' > /etc/otel/storage/config.yaml
              echo '
              output: stdout
              level: info
              ' > /etc/otel/storage/logging.yaml
          resources:
            requests:
              memory: 100Mi
              cpu: 50m
            limits:
              memory: 100Mi
          volumeMounts:
            - mountPath: /etc/otel/storage
              name: storage
            - mountPath: /var/log
              name: varlog
              readOnly: true
      containers:
        - name: opentelemetry-container
          image: ghcr.io/observiq/bindplane-agent:1.80.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000000000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 300Mi
              cpu: 100m
            limits:
              memory: 300Mi
          ports:
            - containerPort: 4317
              name: otlp-grpc
              hostPort: 4317
            - containerPort: 4318
              name: otlp-http
              hostPort: 4318
          env:
            - name: OPAMP_ENDPOINT
              value: wss://app.bindplane.com/v1/opamp
            - name: OPAMP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bindplane-agent-secret
                  key: secret-key
            - name: OPAMP_AGENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPAMP_LABELS
              value: "configuration=astroshop-node,fleet=astroshop-node-fleet"
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CONFIG_YAML_PATH
              value: /etc/otel/storage/config.yaml
            - name: LOGGING_YAML_PATH
              value: /etc/otel/storage/logging.yaml
            - name: MANAGER_YAML_PATH
              value: /etc/otel/storage/manager.yaml
          volumeMounts:
            - mountPath: /etc/otel/storage
              name: storage
            - mountPath: /var/log
              name: varlog
              readOnly: true
      volumes:
        - name: storage
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
      terminationGracePeriodSeconds: 120
---
apiVersion: v1
kind: Service
metadata:
  name: bindplane-node-agent
  namespace: bindplane-agent
  labels:
    app.kubernetes.io/name: bindplane-agent
    app.kubernetes.io/component: node
spec:
  ports:
    - appProtocol: grpc
      name: otlp-grpc
      port: 4317
      targetPort: 4317
    - appProtocol: http
      name: otlp-http
      port: 4318
      targetPort: 4318
  selector:
    app.kubernetes.io/name: bindplane-agent
    app.kubernetes.io/component: node
  type: ClusterIP
